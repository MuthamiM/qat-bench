model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  d_ff: 1024
  max_seq_len: 128
  dropout: 0.1

training:
  lr: 0.0003
  epochs: 5
  batch_size: 32
  warmup_steps: 100
  grad_clip: 1.0
  weight_decay: 0.01
  seed: 42

data:
  dataset: "wikitext"
  subset: "wikitext-2-raw-v1"
  seq_len: 128
  train_split: "train"
  val_split: "validation"
  test_split: "test"

output:
  results_dir: "results"
  checkpoint_dir: "results/checkpoints"
