model:
  d_model: 64
  n_heads: 4
  n_layers: 2
  d_ff: 256
  max_seq_len: 64
  dropout: 0.1

training:
  lr: 0.0003
  epochs: 3
  batch_size: 128
  warmup_steps: 100
  grad_clip: 1.0
  weight_decay: 0.01
  seed: 42

data:
  dataset: "wikitext"
  subset: "wikitext-2-raw-v1"
  seq_len: 64
  train_split: "train"
  val_split: "validation"
  test_split: "test"

output:
  results_dir: "results"
  checkpoint_dir: "results/checkpoints"
